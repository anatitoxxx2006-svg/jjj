<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav>
            <div class="logo">JOHN’S</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">My Courses</a></li>
                <li><a href="add.html" class="active">Add Course</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="card">
            <h2>Add New Course</h2>
            <form id="addCourseForm">
                <div class="form-group">
                    <label for="courseName">Course Name</label>
                    <input type="text" id="courseName" name="courseName" placeholder="e.g. IT" required>
                </div>
                <div class="form-group">
                    <label for="instructor">Instructor</label>
                    <input type="text" id="instructor" name="instructor" placeholder="Full name" required>
                </div>
                <div class="form-group">
                    <label for="creditHours">Credit Hours</label>
                    <select id="creditHours" name="creditHours" required>
                        <option value="1">1 Hour</option>
                        <option value="2">2 Hours</option>
                        <option value="3" selected>3 Hours</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" name="notes" rows="4" placeholder="Any special requirements..."></textarea>
                </div>
                <button type="submit">Add Course</button>
            </form>
            <p id="formFeedback" class="feedback"></p>
        </section>
    </main>
     <footer>
        <p>&copy; 2026 JOHN. All Rights Reserved.</p>
    </footer>
</body>

</html>
